<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Modifier Produit</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">

    <div class="container-fluid">

        <a class="navbar-brand" href="#">
            TP Spring
        </a>

        <div class="navbar-nav">

            <a class="nav-link"
               href="/products">
                Products
            </a>

            <a class="nav-link"
               href="/articles">
                Articles
            </a>

            <a class="nav-link"
               href="/comments">
                Comments
            </a>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <h2>Modifier Produit</h2>

    <form th:action="@{/products/update/{id}(id=${product.id})}"
          th:object="${product}"
          method="post">

        <div class="mb-3">
            <input type="text"
                   th:field="*{name}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <input type="number"
                   step="0.01"
                   th:field="*{price}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <input type="text"
                   th:field="*{description}"
                   class="form-control">
        </div>

        <button type="submit"
                class="btn btn-warning">
            Modifier
        </button>

        <a href="/products"
           class="btn btn-secondary">
            Retour
        </a>

    </form>

</div>

</body>
</html>
